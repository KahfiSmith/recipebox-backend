          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
      security:
