    type: object
  recipebox-backend-go_internal_dto.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  recipebox-backend-go_internal_dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  recipebox-backend-go_internal_dto.MealPlanEnvelope:
    properties:
      data:
