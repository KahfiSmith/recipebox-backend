          $ref: '#/definitions/recipebox-backend-go_internal_dto.DashboardShoppingItem'
        type: array
    type: object
  recipebox-backend-go_internal_dto.TokenEnvelope:
    properties:
      data:
        $ref: '#/definitions/recipebox-backend-go_internal_dto.TokenPair'
    type: object
  recipebox-backend-go_internal_dto.TokenPair:
    properties:
      accessToken:
        type: string
      accessTokenExpiresAt:
        type: string
      refreshToken:
        type: string
      refreshTokenExpiresAt:
        type: string
    type: object
  recipebox-backend-go_internal_dto.UpsertMealPlanRequest:
    properties:
      day:
        type: string
      ingredients:
        items:
          type: string
        type: array
      mealName:
        type: string
      servings:
        type: integer
    type: object
  recipebox-backend-go_internal_dto.UpsertRecipeRequest:
    properties:
      category:
