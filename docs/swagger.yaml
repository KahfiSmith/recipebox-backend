    type: object
  recipebox-backend-go_internal_dto.RefreshRequest:
    properties:
      refreshToken:
        type: string
    type: object
  recipebox-backend-go_internal_dto.RegisterEnvelope:
    properties:
      data:
        $ref: '#/definitions/recipebox-backend-go_internal_dto.RegisterResponse'
    type: object
  recipebox-backend-go_internal_dto.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
    type: object
  recipebox-backend-go_internal_dto.RegisterResponse:
    properties:
      user:
        $ref: '#/definitions/recipebox-backend-go_internal_models.User'
    type: object
  recipebox-backend-go_internal_dto.ResetPasswordRequest:
    properties:
      newPassword:
        type: string
      token:
        type: string
    type: object
  recipebox-backend-go_internal_dto.ShoppingItemEnvelope:
    properties:
