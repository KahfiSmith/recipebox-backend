          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get dashboard overview
      tags:
      - Dashboard
  /api/v1/meal-plans:
    get:
      description: Return meal plans list used by dashboard/meal-plan page.
      produces:
