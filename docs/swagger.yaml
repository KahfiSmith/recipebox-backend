        $ref: '#/definitions/recipebox-backend-go_internal_models.User'
    type: object
  recipebox-backend-go_internal_dto.DashboardEnvelope:
    properties:
      data:
        $ref: '#/definitions/recipebox-backend-go_internal_dto.DashboardResponse'
    type: object
  recipebox-backend-go_internal_dto.DashboardMealPlan:
    properties:
      day:
        type: string
      id:
        type: integer
      ingredients:
        items:
          type: string
        type: array
      mealName:
        type: string
      servings:
        type: integer
    type: object
  recipebox-backend-go_internal_dto.DashboardRecipe:
    properties:
      category:
        type: string
      id:
        type: integer
      name:
        type: string
      prepTime:
        type: integer
      updatedAt:
        type: string
    type: object
  recipebox-backend-go_internal_dto.DashboardResponse:
    properties:
      mealPlans:
        items:
          $ref: '#/definitions/recipebox-backend-go_internal_dto.DashboardMealPlan'
        type: array
      recipes:
        items:
          $ref: '#/definitions/recipebox-backend-go_internal_dto.DashboardRecipe'
        type: array
      shoppingItems:
        items:
          $ref: '#/definitions/recipebox-backend-go_internal_dto.DashboardShoppingItem'
        type: array
      summary:
        $ref: '#/definitions/recipebox-backend-go_internal_dto.DashboardSummary'
    type: object
  recipebox-backend-go_internal_dto.DashboardShoppingItem:
    properties:
      checked:
