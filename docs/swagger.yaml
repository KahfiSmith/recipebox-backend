  recipebox-backend-go_internal_dto.MessageResponse:
    properties:
      message:
        type: string
    type: object
  recipebox-backend-go_internal_dto.OneTimeTokenEnvelope:
    properties:
      data:
        $ref: '#/definitions/recipebox-backend-go_internal_dto.OneTimeTokenResponse'
      message:
        type: string
    type: object
  recipebox-backend-go_internal_dto.OneTimeTokenResponse:
    properties:
      expiresAt:
        type: string
      token:
        type: string
    type: object
  recipebox-backend-go_internal_dto.RecipeEnvelope:
    properties:
      data:
        $ref: '#/definitions/recipebox-backend-go_internal_dto.DashboardRecipe'
    type: object
  recipebox-backend-go_internal_dto.RecipesEnvelope:
    properties:
      data:
        items:
