      - BearerAuth: []
      summary: Delete meal plan
      tags:
      - Meal Plans
    put:
      consumes:
      - application/json
      description: Update a meal plan menu item by ID.
      parameters:
      - description: Meal Plan ID
        in: path
        name: id
        required: true
        type: integer
      - description: Meal plan payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/recipebox-backend-go_internal_dto.UpsertMealPlanRequest'
      produces:
