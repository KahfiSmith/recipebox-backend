      id:
        type: integer
      menuName:
        type: string
      name:
        type: string
      qty:
        type: string
    type: object
  recipebox-backend-go_internal_dto.DashboardSummary:
    properties:
      pendingShoppingItemCount:
        type: integer
      recipeCount:
        type: integer
      upcomingMealPlanCount:
        type: integer
    type: object
  recipebox-backend-go_internal_dto.EmailRequest:
    properties:
