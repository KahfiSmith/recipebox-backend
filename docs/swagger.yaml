    type: object
  recipebox-backend-go_internal_dto.VerifyEmailRequest:
    properties:
      token:
        type: string
    type: object
  recipebox-backend-go_internal_models.User:
    properties:
      createdAt:
        type: string
      email:
        type: string
      emailVerifiedAt:
        type: string
      id:
        type: integer
      name:
        type: string
      updatedAt:
        type: string
    type: object
info:
  contact: {}
  description: API for RecipeBox backend services.
  title: RecipeBox Backend API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Login with email and password.
      parameters:
      - description: Login payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/recipebox-backend-go_internal_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.AuthEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
      summary: Login user
      tags:
      - Auth
  /api/v1/auth/logout:
    post:
      consumes:
      - application/json
      description: Revoke refresh token and clear cookie.
      parameters:
      - description: Refresh payload
        in: body
        name: payload
        schema:
          $ref: '#/definitions/recipebox-backend-go_internal_dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
      summary: Logout
      tags:
      - Auth
  /api/v1/auth/me:
    get:
      description: Return current authenticated user profile.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.UserEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user profile
      tags:
      - Auth
  /api/v1/auth/password/forgot:
    post:
      consumes:
      - application/json
      description: Request reset password flow.
      parameters:
      - description: Email payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/recipebox-backend-go_internal_dto.EmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.OneTimeTokenEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
      summary: Request password reset token
      tags:
      - Auth
  /api/v1/auth/password/reset:
    post:
      consumes:
      - application/json
      description: Reset password using one-time token.
      parameters:
      - description: Reset password payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/recipebox-backend-go_internal_dto.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
      summary: Reset password
      tags:
      - Auth
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: Refresh access token using refresh token (cookie or request body).
      parameters:
      - description: Refresh payload
        in: body
        name: payload
        schema:
          $ref: '#/definitions/recipebox-backend-go_internal_dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.TokenEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
      summary: Refresh access token
      tags:
      - Auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user account.
      parameters:
      - description: Register payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/recipebox-backend-go_internal_dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.RegisterEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
      summary: Register user
      tags:
      - Auth
  /api/v1/auth/verify-email/confirm:
    post:
      consumes:
      - application/json
      description: Verify email using one-time token.
      parameters:
      - description: Verify email payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/recipebox-backend-go_internal_dto.VerifyEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/recipebox-backend-go_internal_dto.ErrorResponse'
      summary: Confirm email verification
      tags:
      - Auth
  /api/v1/auth/verify-email/request:
    post:
      consumes:
      - application/json
      description: Request email verification flow.
      parameters:
      - description: Email payload
        in: body
        name: payload
        required: true
        schema:
