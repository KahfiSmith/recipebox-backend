openapi: 3.0.3
info:
  title: RecipeBox Backend API
  version: 0.3.0
  description: OpenAPI spec for local development and Postman import.
servers:
  - url: http://localhost:8080
tags:
  - name: System
  - name: Auth
  - name: Dashboard
  - name: Recipes
  - name: Meal Plans
  - name: Shopping Items
paths:
  /healthz:
    get:
      tags: [System]
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register user
      description: Registers a new user account. Does not issue access/refresh tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterEnvelope"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login user
      description: Sets HttpOnly refresh token cookie named `refresh_token`. Endpoint is rate-limited.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Email is not verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/verify-email/request:
    post:
      tags: [Auth]
      summary: Request email verification token
      description: Sends verification instructions via email. Token payload is only returned in debug mode.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/MessageResponse"
                  - $ref: "#/components/schemas/OneTimeTokenEnvelope"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/verify-email/confirm:
    post:
      tags: [Auth]
      summary: Confirm email verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/password/forgot:
    post:
      tags: [Auth]
      summary: Request password reset token
      description: Sends reset instructions via email. Token payload is only returned in debug mode.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/MessageResponse"
                  - $ref: "#/components/schemas/OneTimeTokenEnvelope"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/password/reset:
    post:
      tags: [Auth]
      summary: Reset password by token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: Reads refresh token from HttpOnly cookie `refresh_token` (or request body fallback), rotates token, and sets a new cookie. Endpoint is rate-limited.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenEnvelope"
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke refresh token
      description: Reads refresh token from HttpOnly cookie `refresh_token` (or request body fallback), revokes it, and clears cookie.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/dashboard:
    get:
      tags: [Dashboard]
      summary: Get dashboard overview
      description: Returns dashboard data for recipes, meal plans, and shopping items in a single payload.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/recipes:
    get:
      tags: [Recipes]
      summary: List recipes
      description: Returns recipe cards for the recipes menu.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipesEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/meal-plans:
    get:
      tags: [Meal Plans]
      summary: List meal plans
      description: Returns upcoming meal plan entries for the meal plan menu.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealPlansEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/shopping-items:
    get:
      tags: [Shopping Items]
      summary: List shopping items
      description: Returns shopping list items for the shopping menu.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShoppingItemsEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Kahfi Smith
        email:
          type: string
          format: email
          example: test@example.com
        password:
          type: string
          minLength: 8
          maxLength: 72
          example: Password123!
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: test@example.com
        password:
          type: string
          example: Password123!
    EmailRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: test@example.com
    VerifyEmailRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          example: verification-token
    ResetPasswordRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
          example: reset-token
        newPassword:
          type: string
          minLength: 8
          maxLength: 72
          example: NewPassword123!
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          example: refresh-token
    TokenPair:
      type: object
      properties:
        accessToken:
          type: string
        accessTokenExpiresAt:
          type: string
          format: date-time
        refreshToken:
          type: string
          description: Empty in cookie-based mode; refresh token is stored in HttpOnly cookie.
        refreshTokenExpiresAt:
          type: string
          format: date-time
          description: Empty in cookie-based mode.
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Kahfi Smith
        email:
          type: string
          format: email
          example: test@example.com
        emailVerifiedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AuthPayload:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        tokens:
          $ref: "#/components/schemas/TokenPair"
    RegisterPayload:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
    RegisterEnvelope:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/RegisterPayload"
    AuthEnvelope:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/AuthPayload"
    TokenEnvelope:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/TokenPair"
    UserEnvelope:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/User"
    DashboardRecipe:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        totalIngredients:
          type: integer
        updatedAt:
          type: string
          format: date-time
    DashboardMealPlan:
      type: object
      properties:
        id:
          type: integer
          format: int64
        scheduledAt:
          type: string
          format: date-time
        mealType:
          type: string
          example: dinner
        recipeId:
          type: integer
          format: int64
        recipeTitle:
          type: string
    DashboardShoppingItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        quantity:
          type: string
        checked:
          type: boolean
    DashboardSummary:
      type: object
      properties:
        recipeCount:
          type: integer
        upcomingMealPlanCount:
          type: integer
        pendingShoppingItemCount:
          type: integer
    DashboardPayload:
      type: object
      properties:
        summary:
          $ref: "#/components/schemas/DashboardSummary"
        recipes:
          type: array
          items:
            $ref: "#/components/schemas/DashboardRecipe"
        mealPlans:
          type: array
          items:
            $ref: "#/components/schemas/DashboardMealPlan"
        shoppingItems:
          type: array
          items:
            $ref: "#/components/schemas/DashboardShoppingItem"
    DashboardEnvelope:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/DashboardPayload"
    RecipesEnvelope:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/DashboardRecipe"
    MealPlansEnvelope:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/DashboardMealPlan"
    ShoppingItemsEnvelope:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/DashboardShoppingItem"
    OneTimeToken:
      type: object
      properties:
        token:
          type: string
        expiresAt:
          type: string
          format: date-time
    OneTimeTokenEnvelope:
      type: object
      properties:
        message:
          type: string
        data:
          $ref: "#/components/schemas/OneTimeToken"
    MessageResponse:
      type: object
      properties:
        message:
          type: string
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
